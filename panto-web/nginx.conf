server {
    # 前端容器内部只监听 HTTP 80。
    # HTTPS 证书和公网 443 通常由云服务器外层 Nginx 处理。
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 不长期缓存 index.html，避免前端发版后用户一直拿到旧入口文件。
    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Vite 构建后的静态资源文件名带 hash，可以长期缓存。
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # React Router 使用前端路由。
    # 当用户直接打开 /products 或刷新页面时，服务器上没有真实的 /products 文件，
    # 所以这里回退到 index.html，让 React 在浏览器里接管路由。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 基础安全响应头。
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
