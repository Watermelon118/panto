services:
  # 公网入口。浏览器只访问这个服务，后端和数据库不直接暴露到公网。
  # HTTPS 由 EC2 上 Certbot 申请的 Let's Encrypt 证书提供，挂载 /etc/letsencrypt 即可使用。
  # 容器名固定为 panto-gateway，以便证书续签 deploy hook 调用 docker exec 重载配置。
  gateway:
    image: nginx:stable-alpine
    container_name: panto-gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/https.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/nginx-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # React 前端静态资源服务。生产 API 地址默认构建为 /api/v1。
  web:
    build:
      context: ../panto-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-/api/v1}"
    image: "panto-web:${PANTO_IMAGE_TAG:-local}"
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Spring Boot 后端。数据库密码和 JWT 密钥必须由 deploy/.env 或服务器环境注入。
  api:
    build:
      context: ../panto-api
      dockerfile: Dockerfile
    image: "panto-api:${PANTO_IMAGE_TAG:-local}"
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: "prod"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/${POSTGRES_DB:-panto}"
      SPRING_DATASOURCE_USERNAME: "${POSTGRES_USER:-panto}"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}"
      PANTO_JWT_ACCESS_TOKEN_SECRET: "${PANTO_JWT_ACCESS_TOKEN_SECRET:?set PANTO_JWT_ACCESS_TOKEN_SECRET in deploy/.env}"
      PANTO_JWT_REFRESH_TOKEN_SECRET: "${PANTO_JWT_REFRESH_TOKEN_SECRET:?set PANTO_JWT_REFRESH_TOKEN_SECRET in deploy/.env}"
      PANTO_JWT_REFRESH_COOKIE_SECURE: "${PANTO_JWT_REFRESH_COOKIE_SECURE:-true}"
      JAVA_OPTS: "${JAVA_OPTS:--Xms256m -Xmx512m}"
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/actuator/health/readiness || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # PostgreSQL 只在 Docker 内网中可访问，不映射 5432 到宿主机公网。
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-panto}"
      POSTGRES_USER: "${POSTGRES_USER:-panto}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}"
    volumes:
      - panto_pg_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  frontend:
  backend:

volumes:
  panto_pg_data:
