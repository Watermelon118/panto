# HTTPS 网关 Nginx 配置。
# 由 docker-compose.prod.yml 挂载到 /etc/nginx/conf.d/default.conf。
# 证书由 EC2 上的 Certbot 申请，路径 /etc/letsencrypt/live/panto-wms.com/。

# HTTP 入口：
# 1. 保留 /.well-known/acme-challenge/ 给 Let's Encrypt 续签使用。
# 2. 其他 HTTP 请求全部 301 跳转到 HTTPS apex。
server {
    listen 80;
    server_name panto-wms.com www.panto-wms.com;

    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://panto-wms.com$request_uri;
    }
}

# HTTPS apex 入口：浏览器最终访问 https://panto-wms.com。
server {
    listen 443 ssl;
    http2 on;
    server_name panto-wms.com;

    ssl_certificate /etc/letsencrypt/live/panto-wms.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panto-wms.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    client_max_body_size 10m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # API 请求转发到 Spring Boot 后端，保留原始 /api/v1/... 路径。
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 其他请求转发到前端静态资源容器。
    # React Router 的刷新回退由 panto-web 容器内部 Nginx 处理。
    location / {
        proxy_pass http://web:80;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }
}

# HTTPS www 入口：301 跳转到 apex，保持单一规范域名。
server {
    listen 443 ssl;
    http2 on;
    server_name www.panto-wms.com;

    ssl_certificate /etc/letsencrypt/live/panto-wms.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panto-wms.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://panto-wms.com$request_uri;
}
