
services:
  postgres:
    image: postgres:15-alpine
    container_name: panto-postgres
    environment:
      POSTGRES_DB: panto
      POSTGRES_USER: panto
      POSTGRES_PASSWORD: panto123
    ports:
      - "5432:5432"
    volumes:
      - panto_pg_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: panto-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@panto.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  panto_pg_data: