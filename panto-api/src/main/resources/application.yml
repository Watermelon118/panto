spring:
  datasource:
    url: "jdbc:postgresql://127.0.0.1:5432/panto"
    username: "panto"
    password: "panto123"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

panto:
  jwt:
    issuer: "panto-api"
    # Local development secrets only. Replace before production use.
    access-token-secret: "local-dev-access-token-secret-please-change-before-production"
    refresh-token-secret: "local-dev-refresh-token-secret-please-change-before-production"
    access-token-ttl: "PT2H"
    refresh-token-ttl: "P7D"
    refresh-cookie-name: "refresh_token"
