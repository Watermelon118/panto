spring:
  datasource:
    url: "jdbc:postgresql://127.0.0.1:5432/panto"
    username: "panto"
    password: "panto123"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: false

server:
  port: 8080

panto:
  jwt:
    issuer: "panto-api"
    # 这里只放本地开发占位值，后续上线前需要改成真正的高强度密钥
    access-token-secret: "local-dev-access-token-secret-please-change-before-production"
    refresh-token-secret: "local-dev-refresh-token-secret-please-change-before-production"
    access-token-ttl: "PT2H"
    refresh-token-ttl: "P7D"
    refresh-cookie-name: "refresh_token"
